name: Claude CI Setup
description: Install cargo tools, Rust cache, and test shells for Claude CI workflows

inputs:
  install-cargo-tools:
    description: Install cargo-insta and cargo-nextest
    default: "true"
  install-shells:
    description: Install zsh and fish for shell integration tests
    default: "true"

runs:
  using: composite
  steps:
    - name: Install cargo-insta
      if: inputs.install-cargo-tools == 'true'
      uses: baptiste0928/cargo-install@v3
      with:
        crate: cargo-insta
        version: "=1.46.3"

    - name: Install cargo-nextest
      if: inputs.install-cargo-tools == 'true'
      uses: baptiste0928/cargo-install@v3
      with:
        crate: cargo-nextest
        version: "=0.9.132"

    - name: "\U0001F4B0 Cache"
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: ${{ hashFiles('Cargo.lock') }}
        save-if: false

    - name: Install uv
      uses: astral-sh/setup-uv@v7.6.0
      with:
        cache-dependency-glob: .pre-commit-config.yaml

    - name: Install pre-commit
      shell: bash
      run: uv tool install pre-commit

    - name: Install shells (zsh, fish)
      if: inputs.install-shells == 'true'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y zsh fish

    - name: Set build environment
      shell: bash
      run: |
        echo "CARGO_TERM_COLOR=always" >> "$GITHUB_ENV"
        echo "RUSTFLAGS=-C debuginfo=0" >> "$GITHUB_ENV"
        echo "RUSTDOCFLAGS=-Dwarnings" >> "$GITHUB_ENV"
