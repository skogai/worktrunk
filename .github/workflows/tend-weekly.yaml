# Generated by tend. Regenerate with: uvx tend init

name: tend-weekly
on:
  schedule:
    - cron: "17 9 * * 0"
  workflow_dispatch:

jobs:
  weekly:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}

      - uses: ./.github/actions/claude-setup

      - uses: max-sixty/tend@v1
        with:
          github_token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          bot_name: worktrunk-bot
          prompt: |
            /tend-ci-runner:weekly
