name: claude-review
# Runner versions pinned; see ci.yaml header comment for rationale.

# Two modes in one job:
# - pull_request_target: automatic code review on non-draft PRs.
# - pull_request_review: respond to formal reviews on bot-authored PRs.
on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]
  pull_request_review:
    types: [submitted]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C debuginfo=0"
  RUSTDOCFLAGS: "-Dwarnings"

jobs:
  claude:
    if: |
      (github.event_name == 'pull_request_target' &&
        github.event.pull_request.draft == false) ||
      (github.event_name == 'pull_request_review' &&
        github.event.pull_request.user.login == 'worktrunk-bot' &&
        github.event.review.user.login != 'worktrunk-bot' &&
        (github.event.review.state != 'approved' || github.event.review.body))
    # Job-level concurrency (not workflow-level) so that runs skipped by the
    # `if:` above don't enter the concurrency group. Workflow-level concurrency
    # is evaluated before job-level `if:`, so a bot review that will be filtered
    # out still cancels the in-progress run handling that review. See #1305.
    concurrency:
      group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: 📂 Checkout merge commit (initial review)
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}

      - name: 📂 Checkout code (review response)
        if: github.event_name == 'pull_request_review'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}

      # Setup build tools BEFORE checking out PR branch — the composite action
      # lives on main and won't exist on PR branches created before #1273.
      - name: 🔧 Setup build tools
        if: github.event_name == 'pull_request_review'
        uses: ./.github/actions/claude-setup

      - name: 📌 Check out PR branch
        if: github.event_name == 'pull_request_review'
        run: gh pr checkout ${{ github.event.pull_request.number }}
        env:
          GH_TOKEN: ${{ secrets.WORKTRUNK_BOT_TOKEN }}

      - name: 🤖 Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}
          bot_id: "254187624"
          bot_name: "worktrunk-bot"
          allowed_bots: "*"
          allowed_non_write_users: "*"
          additional_permissions: |
            actions: read
          trigger_phrase: "@worktrunk-bot"
          use_sticky_comment: ${{ github.event_name == 'pull_request_target' }}
          prompt: >-
            ${{ github.event_name == 'pull_request_target'
              && format('/review-pr {0}', github.event.pull_request.number)
              || format(
                'A review was submitted on your PR #{0} ({1}). Read the review and full PR context (description, diff, comments, CI status), then respond appropriately. If changes were requested, make them, commit, and push. If questions were asked, answer them.',
                github.event.pull_request.number,
                github.event.review.html_url
              ) }}
          claude_args: |
            --model opus
            --allowedTools Bash,Edit,Read,Write,Glob,Grep,WebSearch,WebFetch,Task,Skill
            --append-system-prompt "You are operating in a GitHub Actions CI environment. Use /running-in-ci before starting work."

      - name: 📋 Upload Claude Code session logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-session-logs
          path: /home/runner/.claude/projects/
          retention-days: 30
          if-no-files-found: warn
