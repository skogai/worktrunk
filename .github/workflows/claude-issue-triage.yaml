name: claude-issue-triage
# Runner versions pinned; see ci.yaml header comment for rationale.

# Automatic triage when new issues are opened.
on:
  issues:
    types: [opened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

# Consistent with ci.yaml for cache compatibility
env:
  CARGO_TERM_COLOR: always
  CLICOLOR_FORCE: 1
  RUSTFLAGS: "-C debuginfo=0"
  RUSTDOCFLAGS: "-Dwarnings"

jobs:
  triage:
    # Skip bot-created issues, @worktrunk-bot mentions (handled by claude-mention.yaml),
    # and issues from worktrunk-bot (nightly workflows, ci-fix, etc.). Nightly
    # workflows handle their own remediation because they have richer context
    # (session logs, aggregate diffs) that would be lost if the triager
    # re-derived it from the issue body alone.
    if: >-
      github.event.issue.user.type != 'Bot' &&
      github.event.issue.user.login != 'worktrunk-bot' &&
      !contains(github.event.issue.body, '@worktrunk-bot') &&
      !contains(github.event.issue.title, '@worktrunk-bot')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          # Use bot token so pushed commits trigger CI workflows
          token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}

      - name: Install cargo-insta
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-insta
          version: "=1.46.3"

      - name: Install cargo-nextest
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-nextest
          # Pin: 0.9.129 requires rustc 1.91, we use 1.90 (rust-toolchain.toml).
          version: "=0.9.128"

      - name: 💰 Cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ hashFiles('Cargo.lock') }}
          save-if: false

      - name: Install shells (zsh, fish)
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh fish

      - name: 🤖 Run Claude Code to triage issue
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Use bot token so pushed commits trigger CI workflows
          github_token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}
          bot_id: "254187624"
          bot_name: "worktrunk-bot"
          # Triage runs for all new issues, including from external contributors
          allowed_non_write_users: '*'
          additional_permissions: |
            actions: read

          prompt: |
            Use /issue-triage ${{ github.event.issue.number }}

          claude_args: |
            --model opus
            --allowedTools Bash,Edit,Read,Write,Glob,Grep,WebSearch,WebFetch,Task,Skill
            --append-system-prompt "You are operating in a GitHub Actions CI environment. Use /running-in-ci before starting work."

      - name: 📋 Upload Claude Code session logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-session-logs
          path: /home/runner/.claude/projects/
          retention-days: 30
          if-no-files-found: warn
