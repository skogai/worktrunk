name: claude-mention
# Runner versions pinned; see ci.yaml header comment for rationale.

on:
  issues:
    types: [edited]
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]

# Consistent with ci.yaml for cache compatibility
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C debuginfo=0"
  RUSTDOCFLAGS: "-Dwarnings"

jobs:
  claude:
    # Two triggers:
    # 1. @worktrunk-bot mentions — explicit requests on any issue/PR.
    #    New issues (opened) go to claude-issue-triage instead; this
    #    workflow only handles issue edits that add @worktrunk-bot.
    # 2. Bot-engaged PRs/issues — any non-bot comment on a PR or issue
    #    where the bot has authored, reviewed, or commented. The verify step
    #    checks engagement via API and skips the job if the bot has not
    #    participated. Formal review submissions
    #    (pull_request_review) go to claude-review instead.
    #
    # Runs in agent mode (prompt). The prompt tells Claude what happened
    # and where to look; Claude reads the full context itself via gh/skills.
    #
    # Note: secrets cannot be used in job-level `if:` (actions/runner#520) —
    # doing so causes GitHub to fail the workflow on push validation.
    #
    # Unlike `pull_request`, the `pull_request_review_comment` event runs on
    # the base repo and has access to secrets even for fork PRs — no fork
    # filter needed. (The `issue_comment` path already works on fork PRs
    # for the same reason.)
    if: |
      (github.event_name == 'issues' &&
        contains(github.event.issue.body, '@worktrunk-bot') &&
        github.event.issue.user.login != 'worktrunk-bot') ||
      (github.event_name == 'issue_comment' &&
        github.event.comment.user.login != 'worktrunk-bot') ||
      (github.event_name == 'pull_request_review_comment' &&
        github.event.comment.user.login != 'worktrunk-bot')
    # Job-level concurrency (not workflow-level) so that runs skipped by the
    # `if:` above don't enter the concurrency group. Workflow-level concurrency
    # is evaluated before job-level `if:`, so bot comments that will be filtered
    # out still cancel in-progress runs. See #1292.
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    permissions:
      contents: write # Allow pushing commits
      pull-requests: write # Allow commenting and updating PRs
      issues: write # Allow commenting on issues
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      # Verify bot engagement — gate for non-mention comments.
      #
      # Skipped (all subsequent steps run) when:
      #   - Event is not a comment (issues edited with @worktrunk-bot)
      #   - Comment body contains @worktrunk-bot (explicit mention)
      #
      # When it runs, checks engagement in order (first match exits 0):
      #
      #   Plain issues:
      #     1. Bot authored the issue
      #     2. Issue body mentions @worktrunk-bot (catches the race where
      #        concurrency cancelled the initial run before the bot commented)
      #     3. Bot has commented on the issue
      #
      #   PRs:
      #     1. Bot authored the PR
      #     2. Bot has left a review
      #     3. Bot has commented
      #
      # If none match → exit 1 (continue-on-error makes this non-fatal;
      # subsequent steps check `steps.verify.outcome != 'failure'`).
      - name: 🔍 Verify bot engagement
        id: verify
        continue-on-error: true
        if: "github.event.comment && !contains(github.event.comment.body || '', '@worktrunk-bot')"
        run: |
          if [ "$GITHUB_EVENT_NAME" = "issue_comment" ]; then
            ISSUE_NUMBER="${{ github.event.issue.number }}"

            if [ -z "${{ github.event.issue.pull_request.url }}" ]; then
              ISSUE_AUTHOR="${{ github.event.issue.user.login }}"
              if [ "$ISSUE_AUTHOR" = "worktrunk-bot" ]; then
                exit 0
              fi
              if echo "$ISSUE_BODY" | grep -qF '@worktrunk-bot'; then
                exit 0
              fi
              BOT_COMMENTS=$(gh api "repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER/comments" \
                --jq '[.[] | select(.user.login == "worktrunk-bot")] | length')
              if [ "$BOT_COMMENTS" -gt "0" ]; then
                exit 0
              fi
              echo "::notice::Bot has not engaged with issue #$ISSUE_NUMBER — skipping"
              exit 1
            fi

            PR_NUMBER="$ISSUE_NUMBER"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          PR_AUTHOR=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json author --jq '.author.login')
          if [ "$PR_AUTHOR" = "worktrunk-bot" ]; then
            exit 0
          fi

          BOT_REVIEWS=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews" \
            --jq '[.[] | select(.user.login == "worktrunk-bot")] | length')
          if [ "$BOT_REVIEWS" -gt "0" ]; then
            exit 0
          fi

          BOT_COMMENTS=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            --jq '[.[] | select(.user.login == "worktrunk-bot")] | length')
          if [ "$BOT_COMMENTS" -gt "0" ]; then
            exit 0
          fi

          echo "::notice::Bot has not engaged with PR #$PR_NUMBER — skipping"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.WORKTRUNK_BOT_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: 📂 Checkout code
        if: steps.verify.outcome != 'failure'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          # Use bot token so pushed commits trigger CI workflows
          token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}

      - name: 👀 React to comment
        # Only react when explicitly mentioned. For bot-engaged conversations
        # without a mention, the bot may exit silently — adding 👀 would
        # create a false expectation of a response.
        if: >-
          steps.verify.outcome != 'failure'
          && github.event.comment
          && contains(github.event.comment.body, '@worktrunk-bot')
        run: |
          # Try issue comment endpoint first, then review comment endpoint.
          # One will match depending on the comment type.
          gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" -f content=eyes 2>/dev/null || \
          gh api "repos/$REPO/pulls/comments/$COMMENT_ID/reactions" -f content=eyes 2>/dev/null || true
        env:
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
          GH_TOKEN: ${{ secrets.WORKTRUNK_BOT_TOKEN }}

      # Setup build tools BEFORE checking out PR branch — the composite action
      # lives on main and won't exist on PR branches created before #1273.
      - name: 🔧 Setup build tools
        if: steps.verify.outcome != 'failure'
        uses: ./.github/actions/claude-setup

      - name: 📌 Check out PR branch (conversation comment)
        if: steps.verify.outcome != 'failure' && github.event.issue.pull_request
        run: |
          PR_STATE=$(gh pr view ${{ github.event.issue.number }} --json state --jq '.state')
          if [ "$PR_STATE" = "OPEN" ]; then
            gh pr checkout ${{ github.event.issue.number }}
          else
            echo "::warning::PR is $PR_STATE — staying on default branch"
          fi
        env:
          GH_TOKEN: ${{ secrets.WORKTRUNK_BOT_TOKEN }}

      - name: 📌 Check out PR branch (review comment)
        if: steps.verify.outcome != 'failure' && github.event_name == 'pull_request_review_comment'
        run: |
          PR_STATE=$(gh pr view ${{ github.event.pull_request.number }} --json state --jq '.state')
          if [ "$PR_STATE" = "OPEN" ]; then
            gh pr checkout ${{ github.event.pull_request.number }}
          else
            echo "::warning::PR is $PR_STATE — staying on default branch"
          fi
        env:
          GH_TOKEN: ${{ secrets.WORKTRUNK_BOT_TOKEN }}

      - name: 🤖 Run Claude Code
        if: steps.verify.outcome != 'failure'
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Use bot token so pushed commits trigger CI workflows
          github_token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}
          bot_id: "254187624"
          bot_name: "worktrunk-bot"
          allowed_non_write_users: '*'

          trigger_phrase: "@worktrunk-bot"
          additional_permissions: |
            actions: read

          # Always agent mode. The prompt tells Claude what happened; the
          # /running-in-ci skill instructs it to read full context via gh.
          #
          # Four prompt paths:
          # 1. Inline review comment (pull_request_review_comment) → reply in thread
          # 2. Explicit @worktrunk-bot mention in a comment → always respond
          # 3. Comment on bot-engaged issue/PR (no mention) → only if helpful
          # 4. Issue edited with @worktrunk-bot mention → always respond
          prompt: >-
            ${{ github.event_name == 'pull_request_review_comment'
              && (contains(github.event.comment.body, '@worktrunk-bot')
                && format(
                  'You were mentioned in an inline review comment on PR #{0} ({1}, review comment ID {2}). Read the full PR context (description, diff, recent comments, CI status) and respond. If they''re requesting changes, make the changes, commit, and push. If they''re asking a question, answer it. Reply in the review thread using `gh api repos/{3}/pulls/{0}/comments/{2}/replies -f body="..."` — do not create a new top-level comment.',
                  github.event.pull_request.number,
                  github.event.comment.html_url,
                  github.event.comment.id,
                  github.repository
                )
                || format(
                  'A user left an inline review comment on a PR where you previously participated (PR #{0}, {1}, review comment ID {2}). Read the full context (description, diff, recent comments, CI status). Only respond if the comment is directed at you, asks a question you can help with, or requests changes you can make. If the conversation is between humans and doesn''t need your input, exit silently without commenting. Note: if you are the author of the PR or issue, commenters are probably expecting the author to engage — lean toward responding. Reply in the review thread using `gh api repos/{3}/pulls/{0}/comments/{2}/replies -f body="..."` — do not create a new top-level comment.',
                  github.event.pull_request.number,
                  github.event.comment.html_url,
                  github.event.comment.id,
                  github.repository
                ))
              || github.event.comment.html_url
              && (contains(github.event.comment.body, '@worktrunk-bot')
                && format(
                  'You were mentioned in a comment ({0}). Read the full issue or PR (description, diff, recent comments, CI status) and respond. If they''re requesting changes, make the changes, commit, and push. If they''re asking a question, answer it. When suggesting code changes on a PR, use the review-pr skill for inline suggestions.',
                  github.event.comment.html_url
                )
                || format(
                  'A user commented on an issue/PR where you previously participated ({0}). Read the full context (description, recent comments, CI status). Only respond if the comment is directed at you, asks a question you can help with, or requests changes you can make. A comment that responds to concerns you raised in a review is directed at you — briefly acknowledge that the concerns are resolved (or explain why they aren''t). If the conversation is between humans and doesn''t need your input, exit silently without commenting. Note: if you are the author of the PR or issue, commenters are probably expecting the author to engage — lean toward responding. When suggesting code changes on a PR, use the review-pr skill for inline suggestions.',
                  github.event.comment.html_url
                ))
              || format(
                'An issue was updated with a mention of you ({0}). Read it and respond.',
                github.event.issue.html_url
              ) }}

          claude_args: |
            --model opus
            --allowedTools Bash,Edit,Read,Write,Glob,Grep,WebSearch,WebFetch,Task,Skill
            --append-system-prompt "You are operating in a GitHub Actions CI environment. Use /running-in-ci before starting work."

      - name: 📋 Upload Claude Code session logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-session-logs
          path: /home/runner/.claude/projects/
          retention-days: 30
          if-no-files-found: warn
